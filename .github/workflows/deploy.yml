name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present || true

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present || true

      - name: Build Docker image
        run: docker build -t monportfolio:latest .

      - name: Run Docker container (test)
        run: |
          docker run -d -p 3000:3000 --name test-container monportfolio:latest
          sleep 5
          curl http://localhost:3000 || true
          docker stop test-container
          docker rm test-container

  deploy-render:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deployment
        run: |
          curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}

  deploy-railway:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Railway
        uses: AustinScott/action-railway-deploy@v1.1.1
        with:
          railway-token: ${{ secrets.RAILWAY_TOKEN }}
          service: monportfolio
