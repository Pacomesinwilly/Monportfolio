version: '3.8'

services:
  monportfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monportfolio-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - monportfolio-network

  # Service Nginx (optionnel - pour reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: monportfolio-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - monportfolio
    restart: unless-stopped
    networks:
      - monportfolio-network

networks:
  monportfolio-network:
    driver: bridge
