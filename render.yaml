services:
  - type: web
    name: monportfolio
    runtime: node
    runtimeVersion: 20.11.0
    plan: free
    region: iad
    healthCheckPath: /
    healthCheckInterval: 30
    maxShutdownDelay: 30
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm install -g serve && serve -s dist -l 3000
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
